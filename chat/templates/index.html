<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatroom</title>
</head>
<body>
    Enter a username:<br>
    <input id="username-input" type="text" size="100"><br><br>
    What chat room would you like to enter?<br>
    <input id="room-name-input" type="text" size="100"><br>
    <input id="room-name-submit" type="button" value="Enter">

    <script>
        document.querySelector('#username-input').focus();

        document.querySelector('#room-name-input').onkeyup = function(e) {
            if (e.key === 'Enter') document.querySelector('#room-name-submit').click();
        };

        // Clear stale username when landing on the lobby
      

        document.querySelector('#room-name-submit').onclick = function(e) {
            var username = document.querySelector('#username-input').value.trim();
            var roomName = document.querySelector('#room-name-input').value.trim();
            if (!username) { alert('Please enter a username.'); return; }
            if (!roomName) { alert('Please enter a room name.'); return; }
            sessionStorage.setItem('chatUsername', username);
            window.location.pathname = roomName + '/';
        };
    </script>
</body>
</html>
